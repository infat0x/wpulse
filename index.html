<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPulse — WordPress Security Intelligence</title>
<link rel="icon" type="image/png" href="./logo.png">
<link rel="shortcut icon" href="./logo.png">
<meta name="description" content="Professional WPScan output analyzer with vulnerability intelligence, CVE tracking, and advanced filtering. Runs entirely in the browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/main.css">
</head>
<body>

<!-- Drop Overlay -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-icon">📄</div>
  <div class="drop-overlay-text">Drop WPScan Output File</div>
  <div class="drop-overlay-sub">Supports .txt and .log files</div>
</div>

<!-- ═══ NAVIGATION ═══ -->
<nav class="navbar" id="navbar">
  <div class="nav-brand">
    <div class="nav-logo">W</div>
    <div class="nav-title">WPULSE</div>
  </div>

  <div class="nav-links">
    <button class="nav-link active" id="navHome" onclick="showView('hero')">Home</button>
    <button class="nav-link" id="navDashboard" onclick="showView('dashboard')">Dashboard</button>
    <button class="nav-link" id="navInput" onclick="showView('input')">New Scan</button>
    <button class="nav-link" id="navHistory" onclick="toggleSidebar()">History</button>
  </div>

  <div class="nav-sep"></div>

  <div class="nav-right">
    <div class="global-search" style="display: flex; align-items: center; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; margin-right: 12px; height: 32px; transition: border-color 0.2s;">
      <span style="font-size: 14px; margin-right: 6px; color: var(--txt-3);">🔍</span>
      <input type="text" id="globalSearchInput" placeholder="Search page..." onkeydown="handleCustomGlobalSearch(event, this.value)" style="border: none; background: transparent; font-family: var(--body); font-size: 13px; color: var(--txt); outline: none; width: 160px;">
    </div>
    <div class="theme-switch" id="themeToggle" onclick="toggleTheme()" title="Toggle Dark Mode">
      <div class="theme-switch-thumb"></div>
      <svg class="theme-sun" viewBox="0 0 24 24" width="14" height="14" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="theme-moon" viewBox="0 0 24 24" width="14" height="14" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </div>
    <div class="nav-status">
      <div class="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <button class="nav-cta" onclick="showView('input')">ANALYZE</button>
  </div>
</nav>

<!-- ═══ APP LAYOUT ═══ -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar collapsed" id="sidebar">
    <!-- History Section -->
    <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="sidebar-head">
        <span class="sidebar-label">Scan History</span>
        <button class="sidebar-action" onclick="clearHistory()">Clear</button>
      </div>
      <div class="sidebar-body" style="flex:1;overflow-y:auto">
        <div class="hist-list" id="histList">
          <div class="hist-empty">No scans yet.<br>Analyze a WPScan output to see history.</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">

    <!-- Input View (shown by default) -->
    <div id="viewInput">
      <div class="hero">
        <div class="hero-decorator">
          <div class="hero-dot"></div>
          <span class="hero-label">Security Intelligence</span>
        </div>
        <h1>MULTI-TOOL<br><em>ANALYZER.</em></h1>
        <p class="hero-desc">Select a security tool below to parse and analyze your scan output instantly.</p>
        <div id="toolGrid" class="tool-grid">
          <!-- Tool cards will be injected here by app.js -->
        </div>
      </div>
    </div>

    <!-- Input Panel (modal-like) -->
    <div id="viewInputPanel" style="display:none">
      <div style="max-width:800px;margin:40px auto;padding:0 32px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <div class="hero-dot"></div>
          <span class="sidebar-label" id="inputPanelTitle">Paste Output</span>
          <button class="btn btn-ghost" onclick="showView('home')" style="margin-left:auto">← Back</button>
        </div>
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:10px;overflow:hidden">
          <textarea id="raw" spellcheck="false" autocomplete="off" style="width:100%;min-height:400px;background:var(--bg-input);border:none;color:var(--txt);font-family:var(--mono);font-size:12px;padding:20px;resize:vertical;outline:none;line-height:1.8" placeholder="Paste your output here..."></textarea>
          <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center">
            <button class="btn btn-accent" id="analyzeBtn" onclick="go()">
              <div class="spin"></div>
              <span class="btn-text">ANALYZE</span>
            </button>
            <button class="btn btn-secondary" onclick="document.getElementById('raw').value=''">Clear</button>
            <button class="btn btn-ghost" id="loadExampleBtn" onclick="loadExample()">Load Example</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div id="viewDashboard" style="display:none"></div>

  </div>
</div>

  <!-- Floating Back Button -->
  <button id="floatingBackBtn" class="floating-back-btn" onclick="goBackBtnClicked()">
    <span class="icon" style="display: flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </span>
    <span>BACK</span>
  </button>

  <script src="./js/app.js"></script>
  <script src="./js/wpscan.js"></script>
  <script src="./js/nmap.js"></script>
  <script src="./js/winpeas.js"></script>
</body>
</html>
